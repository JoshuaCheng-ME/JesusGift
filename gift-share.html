            <div class="text-center mb-10 fade-in">
                <h2 class="text-2xl md:text-3xl font-serif text-deepBlue mb-3" data-i18n="title">定制你的专属礼物</h2>
                <p class="text-gray-500" data-i18n="subtitle">填写下方信息，预览并保存这份充满爱意的礼物</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
                <!-- Card Preview -->
                <div class="order-2 lg:order-1 fade-in" style="animation-delay: 0.1s">
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-lightGray/50">
                        <h3 class="text-sm text-gray-400 mb-4 font-medium" data-i18n="preview">预览</h3>
                        
                        <!-- Gift Card Canvas -->
                        <div id="giftCard" class="card-preview aspect-[4/3] rounded-xl flex flex-col items-center justify-center p-8 text-center relative">
                            <!-- Cross Icon -->
                            <div class="absolute top-6 right-6 opacity-20">
                                <svg class="w-16 h-16 text-white" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2L13.09 8.26L19 7L14.74 11.26L21 13L14.74 14.74L19 19L13.09 17.74L12 24L10.91 17.74L5 19L9.26 14.74L3 13L9.26 11.26L5 7L10.91 8.26L12 2Z"/>
                                </svg>
                            </div>
                            
                            <!-- Gift Icon -->
                            <div class="w-20 h-20 rounded-full bg-white/30 backdrop-blur-sm flex items-center justify-center mb-6 shadow-lg">
                                <div id="giftIcon" class="text-white">
                                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                                    </svg>
                                </div>
                            </div>
                            
                            <!-- Gift Title -->
                            <h4 id="giftTitle" class="text-white font-serif text-xl mb-4 drop-shadow-lg">职场焦虑卡</h4>
                            
                            <!-- From & To -->
                            <div class="space-y-2 text-white/90 text-sm">
                                <p><span data-i18n="fromLabel">From:</span> <span id="fromText">匿名</span></p>
                                <p><span data-i18n="toLabel">To:</span> <span id="toText">亲爱的朋友</span></p>
                            </div>
                            
                            <!-- Blessing -->
                            <p id="blessingText" class="mt-6 text-white/80 text-sm italic leading-relaxed max-w-xs"></p>
                            
                            <!-- Bottom Logo -->
                            <div class="absolute bottom-4 left-0 right-0 text-center">
                                <span class="text-white/50 text-xs">JesusGift.org</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="mt-6 space-y-4">
                        <button onclick="downloadCard()" class="w-full py-4 btn-primary text-white rounded-xl font-medium flex items-center justify-center space-x-2">

                            </svg>
                            <span data-i18n="btn.download">生成并保存礼物</span>
                        </button>

                        </div>
                        
                        <!-- To Input -->

                            <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="label.to">收礼人（To）</label>
                            <input type="text" id="toInput" oninput="updatePreview()" data-i18n-placeholder="placeholder.to" placeholder="请输入收礼人的名字" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow">
                        </div>
                        
                        <!-- Blessing Selection -->
                        <div class="mb-8">
                            <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="label.verse">选择经文祝福</label>
                            <select id="blessingSelect" onchange="updatePreview()" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow bg-white">
                                <option value="john14_1" data-i18n="verse.john14_1">约翰福音 14:1 - 你们心里不要忧愁</option>
                                <option value="phil4_6" data-i18n="verse.phil4_6">腓立比书 4:6 - 应当一无挂虑</option>
                                <option value="psalm23" data-i18n="verse.psalm23">诗篇 23篇 - 耶和华是我的牧者</option>
                                <option value="psalm46_10" data-i18n="verse.psalm46_10">诗篇 46:10 - 你们要休息</option>
                                <option value="matt11_28" data-i18n="verse.matt11_28">马太福音 11:28 - 到我这里来</option>
                                <option value="isaiah41_10" data-i18n="verse.isaiah41_10">以赛亚书 41:10 - 不要惧怕</option>
                                <option value="rom8_28" data-i18n="verse.rom8_28">罗马书 8:28 - 万事互相效力</option>
                                <option value="custom" data-i18n="verse.custom">自定义祝福</option>
                            </select>
                        </div>
                        
                        <!-- Custom Blessing -->
                        <div id="customBlessingWrapper" class="mb-8 hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="label.custom">自定义祝福语</label>
                            <textarea id="customBlessing" oninput="updatePreview()" data-i18n-placeholder="placeholder.custom" rows="3" placeholder="请输入自定义祝福语..." class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow resize-none"></textarea>
                        </div>
                        
                        <!-- Free Gift Notice -->
                        <div class="bg-warmBeige/50 rounded-xl p-6 border border-warmBeige">
                            <div class="flex items-start space-x-3">
                                <svg class="w-5 h-5 text-earthBrown mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <div class="text-sm text-gray-600">
                                    <p class="font-medium text-earthBrown mb-1" data-i18n="notice.title">Gift is Free</p>
                                    <p data-i18n="notice.desc">You can download this gift for free. If you'd like to support our ministry, any donation is appreciated.</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Continue Button -->
                        <div class="mt-6">
                            <a href="https://jesusgift.org" class="block w-full py-4 bg-earthBrown text-white rounded-xl font-medium text-center hover:bg-deepBlue transition-colors" data-i18n="btn.continue">
                                Continue to Download &#8594;
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

        <p>&copy; 2024 JesusGift.org · <span data-i18n="footer.copy">免费使用，分享爱与希望</span></p>

        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('jesusgift-lang', lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;

            const labels = { zh: '中文', en: 'English', fr: 'Français', de: 'Deutsch', ru: 'Русский', ja: '日本語' };
            document.getElementById('currentLang').textContent = labels[lang];

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[lang] && i18n[lang][key]) {
                    el.placeholder = i18n[lang][key];
                }
            });

            // Update select option texts
            const giftSelect = document.getElementById('giftSelect');
            if (giftSelect) {
                Array.from(giftSelect.options).forEach(opt => {
                    const key = opt.getAttribute('data-i18n');
                    if (key && i18n[lang] && i18n[lang][key]) {
                        opt.textContent = i18n[lang][key];
                    }
                });
            }
            const blessingSelect = document.getElementById('blessingSelect');
            if (blessingSelect) {
                Array.from(blessingSelect.options).forEach(opt => {
                    const key = opt.getAttribute('data-i18n');
                    if (key && i18n[lang] && i18n[lang][key]) {
                        opt.textContent = i18n[lang][key];
                    }
                });
            }

            // Update default values if not user-modified
            const fromInput = document.getElementById('fromInput');
            const toInput = document.getElementById('toInput');
            const defs = defaultNames[lang];
            const zhDefs = defaultNames.zh;
            const enDefs = defaultNames.en;
            if (fromInput && (!fromInput.dataset.userChanged || fromInput.value === zhDefs.from || fromInput.value === enDefs.from || Object.values(defaultNames).some(d => d.from === fromInput.value))) {
                fromInput.value = defs.from;
            }
            if (toInput && (!toInput.dataset.userChanged || toInput.value === zhDefs.to || toInput.value === enDefs.to || Object.values(defaultNames).some(d => d.to === toInput.value))) {

            // Reset blessing based on gift type
            const map = {
                anxiety: 'john14_1',
                loneliness: 'phil4_6',
                gratitude: 'psalm23',
                healing: 'psalm46_10',
                exam: 'matt11_28',
                birthday: 'isaiah41_10'
            };
            document.getElementById('blessingSelect').value = map[giftKey] || 'john14_1';
            updatePreview();
        }

        function updatePreview() {
            const from = document.getElementById('fromInput').value || defaultNames[currentLang].from;
            const to = document.getElementById('toInput').value || defaultNames[currentLang].to;
            const blessingKey = document.getElementById('blessingSelect').value;

            document.getElementById('fromText').textContent = from;
            document.getElementById('toText').textContent = to;

            if (blessingKey === 'custom') {
                const customText = document.getElementById('customBlessing').value;
                document.getElementById('blessingText').textContent = customText || '';
            } else {
                document.getElementById('blessingText').textContent = blessingVerses()[blessingKey] || '';
            }
        }

        document.getElementById('blessingSelect').addEventListener('change', function() {
            const customWrapper = document.getElementById('customBlessingWrapper');
            if (this.value === 'custom') {
                customWrapper.classList.remove('hidden');
            } else {
                customWrapper.classList.add('hidden');
            }
            updatePreview();
        });

        // URL parameter handling
        const urlParams = new URLSearchParams(window.location.search);
        const giftParam = urlParams.get('gift');
        if (giftParam && giftDataAll.zh[giftParam]) {
            document.getElementById('giftSelect').value = giftParam;
        }

        function downloadCard() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800;
            canvas.height = 600;

            const gradient = ctx.createLinearGradient(0, 0, 800, 600);
            gradient.addColorStop(0, '#F5EDE4');
            gradient.addColorStop(0.5, '#A8C5D9');
            gradient.addColorStop(1, '#B5C4A8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < 15; j++) {
                    if ((i + j) % 2 === 0) {
                        ctx.beginPath();
                        ctx.arc(40 + i * 40, 40 + j * 40, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(400, 180, 60, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(400, 200);
            ctx.bezierCurveTo(400, 190, 390, 170, 370, 170);
            ctx.bezierCurveTo(345, 170, 345, 200, 345, 200);
            ctx.bezierCurveTo(345, 220, 370, 240, 400, 260);
            ctx.bezierCurveTo(430, 240, 455, 220, 455, 200);
            ctx.bezierCurveTo(455, 200, 455, 170, 430, 170);
            ctx.bezierCurveTo(410, 170, 400, 190, 400, 200);
            ctx.fillStyle = 'white';
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px "Noto Serif", serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 10;
            ctx.fillText(document.getElementById('giftTitle').textContent, 400, 300);

            ctx.font = '20px "Noto Sans", sans-serif';
            ctx.shadowBlur = 5;
            ctx.fillText(document.getElementById('fromText').parentElement.textContent.trim().replace(/\n/g, ' '), 400, 360);

            ctx.font = 'italic 18px "Noto Sans", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            const blessing = document.getElementById('blessingText').textContent;
            wrapText(ctx, blessing, 400, 460, 500, 24);

            ctx.font = '14px "Noto Sans", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillText('JesusGift.org', 400, 560);

            const link = document.createElement('a');
            link.download = 'jesusgift-' + document.getElementById('giftSelect').value + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split('');
            let line = '';
            let currentY = y;
            for (let i = 0; i < words.length; i++) {
                const testLine = line + words[i];
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(line, x, currentY);
                    line = words[i];
                    currentY += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, currentY);
        }

        function shareLink() {
            const gift = document.getElementById('giftSelect').value;
            const from = encodeURIComponent(document.getElementById('fromInput').value || defaultNames[currentLang].from);
            const to = encodeURIComponent(document.getElementById('toInput').value || defaultNames[currentLang].to);
            const shareUrl = window.location.origin + window.location.pathname + '?gift=' + gift + '&from=' + from + '&to=' + to;

            navigator.clipboard.writeText(shareUrl).then(() => {
                const copied = { zh: '分享链接已复制到剪贴板！', en: 'Share link copied to clipboard!', fr: 'Lien de partage copié !', de: 'Link kopiert!', ru: 'Ссылка скопирована!', ja: '共有リンクをコピーしました！' };
                alert(copied[currentLang] || copied.zh);
            }).catch(() => {
                prompt('Copy this link:', shareUrl);
            });
        }
    </script>
