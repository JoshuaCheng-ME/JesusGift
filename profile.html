        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FAF7F2',
                        warmBeige: '#F5EDE4',
                        softBlue: '#A8C5D9',
                        deepBlue: '#5B7A8C',
                        earthBrown: '#8B7355',
                        gentleGreen: '#B5C4A8',
                        lightGray: '#E8E4DE',

                        serif: ['Noto Serif SC', 'Noto Serif', 'serif'],

        body { font-family: 'Noto Sans SC', 'Noto Sans', sans-serif; background-color: #FAF7F2; }

        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-cream/80 backdrop-blur-sm sticky top-0 z-50 border-b border-lightGray/50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>

                </a>

                    <div class="relative">
                        <button onclick="toggleLangMenu()" class="flex items-center space-x-1 px-3 py-2 rounded-lg border border-lightGray hover:bg-white/50 transition-colors text-sm">
                            <svg class="w-4 h-4 text-deepBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                            </svg>
                            <span id="currentLang">中文</span>

                        <div id="langMenu" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-xl shadow-lg border border-lightGray/50 py-2 z-50">
                            <button onclick="setLang('zh')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">中文</button>
                            <button onclick="setLang('en')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">English</button>
                            <button onclick="setLang('fr')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">Français</button>
                            <button onclick="setLang('de')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">Deutsch</button>
                            <button onclick="setLang('ru')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">Русский</button>
                            <button onclick="setLang('ja')" class="w-full text-left px-4 py-2 text-sm hover:bg-warmBeige/30">日本語</button>

                    <!-- Logout -->

    </header>

    <!-- Main Content -->
    <main class="flex-1 py-10 px-4">
        <div class="max-w-4xl mx-auto">
            <!-- Profile Header -->
            <div class="bg-white rounded-2xl p-8 shadow-lg border border-lightGray/50 mb-8 fade-in">
                <div class="flex items-center space-x-6">
                    <div class="w-20 h-20 rounded-full bg-softBlue/30 flex items-center justify-center">
                        <svg class="w-10 h-10 text-deepBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h2 id="userName" class="text-2xl font-serif text-deepBlue">用户</h2>
                        <p id="userEmail" class="text-gray-500">email@example.com</p>
                        <p class="text-sm text-gray-400 mt-1" data-i18n="text.memberSince">注册时间: <span id="userCreatedAt">-</span></p>
                    </div>
                    <div class="ml-auto text-center">
                        <div class="text-3xl font-serif text-deepBlue" id="shareCount">0</div>
                        <p class="text-sm text-gray-400" data-i18n="text.shareCount">礼物分享次数</p>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="bg-white rounded-2xl shadow-lg border border-lightGray/50 mb-8 fade-in" style="animation-delay: 0.1s">
                <div class="flex border-b border-lightGray/50">
                    <button id="profileTabBtn" onclick="showSection('profile')" class="flex-1 py-4 text-center font-medium border-b-2 border-deepBlue text-deepBlue" data-i18n="tab.profile">个人信息</button>
                    <button id="historyTabBtn" onclick="showSection('history')" class="flex-1 py-4 text-center font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600" data-i18n="tab.history">分享记录</button>
                    <button id="settingsTabBtn" onclick="showSection('settings')" class="flex-1 py-4 text-center font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600" data-i18n="tab.settings">账户设置</button>
                </div>

                <!-- Profile Section -->
                <div id="profileSection" class="p-8">
                    <form onsubmit="updateProfile(event)">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label.name">姓名</label>
                                <input type="text" id="profileName" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label.email">邮箱</label>
                                <input type="email" id="profileEmail" disabled class="w-full px-4 py-3 rounded-xl border border-lightGray bg-gray-50 text-gray-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label.language">语言偏好</label>
                                <select id="profileLanguage" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow bg-white">
                                    <option value="zh">中文</option>
                                    <option value="en">English</option>
                                    <option value="fr">Français</option>
                                    <option value="de">Deutsch</option>
                                    <option value="ru">Русский</option>
                                    <option value="ja">日本語</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full py-4 bg-deepBlue text-white rounded-xl font-medium hover:bg-deepBlue/90 transition-colors" data-i18n="btn.save">保存修改</button>
                        </div>
                    </form>
                    <div id="profileMsg" class="hidden mt-4 p-4 rounded-xl text-sm"></div>
                </div>

                <!-- History Section -->
                <div id="historySection" class="p-8 hidden">
                    <div id="shareHistory" class="space-y-4">
                        <!-- Will be populated by JS -->
                    </div>
                    <div id="noHistory" class="text-center py-12 text-gray-400" data-i18n="text.noHistory">暂无分享记录</div>
                </div>

                <!-- Settings Section -->
                <div id="settingsSection" class="p-8 hidden">
                    <h3 class="text-lg font-medium text-gray-700 mb-6" data-i18n="title.changePassword">修改密码</h3>
                    <form onsubmit="changePassword(event)">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label.currentPassword">当前密码</label>
                                <input type="password" id="currentPassword" required class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="label.newPassword">新密码</label>
                                <input type="password" id="newPassword" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none transition-all input-glow">
                            </div>
                            <button type="submit" class="w-full py-4 bg-earthBrown text-white rounded-xl font-medium hover:bg-earthBrown/90 transition-colors" data-i18n="btn.changePassword">修改密码</button>
                        </div>
                    </form>
                    <div id="passwordMsg" class="hidden mt-4 p-4 rounded-xl text-sm"></div>

                    <!-- Danger Zone -->
                    <div class="mt-8 pt-8 border-t border-lightGray/50">

                    </div>

                        <p class="text-sm text-gray-400" data-i18n="action.browseGiftsDesc">查看所有可用的礼物</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

        let currentLang = localStorage.getItem('jesusgift-lang') || 'zh';
        let token = localStorage.getItem('jesusgift-token');
        let userData = null;

        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('jesusgift-lang', lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;

            const labels = { zh: '中文', en: 'English', fr: 'Français', de: 'Deutsch', ru: 'Русский', ja: '日本語' };
            document.getElementById('currentLang').textContent = labels[lang];

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
            });
        }

        function toggleLangMenu() { document.getElementById('langMenu').classList.toggle('hidden'); }
        function setLang(lang) { applyLang(lang); toggleLangMenu(); }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('langMenu');
            const btn = e.target.closest('button[onclick="toggleLangMenu()"]');
            if (!btn && !menu.classList.contains('hidden')) menu.classList.add('hidden');
        });

        function showSection(section) {
            ['profile', 'history', 'settings'].forEach(s => {
                document.getElementById(s + 'Section').classList.add('hidden');
                document.getElementById(s + 'TabBtn').classList.remove('border-deepBlue', 'text-deepBlue');
                document.getElementById(s + 'TabBtn').classList.add('border-transparent', 'text-gray-400');
            });
            document.getElementById(section + 'Section').classList.remove('hidden');
            document.getElementById(section + 'TabBtn').classList.add('border-deepBlue', 'text-deepBlue');
            document.getElementById(section + 'TabBtn').classList.remove('border-transparent', 'text-gray-400');

            if (section === 'history') loadShareHistory();
        }

        async function loadProfile() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!data.success) {
                    localStorage.removeItem('jesusgift-token');
                    localStorage.removeItem('jesusgift-user');
                    window.location.href = 'login.html';
                    return;
                }

                userData = data.data;
                document.getElementById('userName').textContent = userData.name || '用户';
                document.getElementById('userEmail').textContent = userData.email;
                document.getElementById('userCreatedAt').textContent = userData.created_at ? new Date(userData.created_at).toLocaleDateString() : '-';
                document.getElementById('shareCount').textContent = userData.share_count || 0;

                document.getElementById('profileName').value = userData.name || '';
                document.getElementById('profileEmail').value = userData.email;
                document.getElementById('profileLanguage').value = userData.language || 'zh';

                applyLang(userData.language || currentLang);
            } catch (err) {
                console.error('Load profile error:', err);
            }
        }

        async function loadShareHistory() {
            if (!token) return;

            try {
                const res = await fetch(`${API_BASE}/auth/shares`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                const container = document.getElementById('shareHistory');
                const noHistory = document.getElementById('noHistory');

                if (data.success && data.data.length > 0) {
                    noHistory.classList.add('hidden');
                    container.innerHTML = data.data.map(share => `
                        <div class="bg-warmBeige/30 rounded-xl p-4 flex items-center justify-between">
                            <div>
                                <p class="font-medium text-deepBlue">${share.title_zh || share.gift_key}</p>
                                <p class="text-sm text-gray-500">${i18n[currentLang]['history.to']}: ${share.to_name || '-'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm text-gray-400">${i18n[currentLang]['history.method']}: ${share.share_method}</p>
                                <p class="text-xs text-gray-400">${new Date(share.created_at).toLocaleDateString()}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    noHistory.classList.remove('hidden');
                    container.innerHTML = '';
                }
            } catch (err) {
                console.error('Load history error:', err);
            }
        }

        async function updateProfile(e) {
            e.preventDefault();
            const name = document.getElementById('profileName').value;
            const language = document.getElementById('profileLanguage').value;

            try {
                const res = await fetch(`${API_BASE}/auth/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, language })
                });
                const data = await res.json();

                const msg = document.getElementById('profileMsg');
                if (data.success) {
                    msg.className = 'mt-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-600 text-sm';
                    msg.textContent = i18n[currentLang]['msg.profileSaved'];
                    msg.classList.remove('hidden');
                    document.getElementById('userName').textContent = name || '用户';
                    applyLang(language);
                } else {
                    msg.className = 'mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm';
                    msg.textContent = data.message || 'Error';
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Update profile error:', err);
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            try {
                const res = await fetch(`${API_BASE}/auth/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const data = await res.json();

                const msg = document.getElementById('passwordMsg');
                if (data.success) {
                    msg.className = 'mt-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-600 text-sm';
                    msg.textContent = i18n[currentLang]['msg.passwordChanged'];
                    msg.classList.remove('hidden');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    msg.className = 'mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm';
                    msg.textContent = data.message || i18n[currentLang]['msg.passwordError'];
                    msg.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Change password error:', err);
            }
        }

        function logout() {
            localStorage.removeItem('jesusgift-token');
            localStorage.removeItem('jesusgift-user');
            window.location.href = 'index.html';
        }

        async function deleteAccount() {
            if (!confirm(i18n[currentLang]['msg.confirmDelete'])) return;

            // Note: This would require an admin API call since we don't have a user self-delete endpoint
            // For now, just logout and show message
            alert('请联系管理员删除账户: admin@jesusgift.org');
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyLang(currentLang);
            loadProfile();
        });
    </script>
</body>
</html>
