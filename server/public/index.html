<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JesusGift.org - 白白得来，白白舍去</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FAF7F2',
                        warmBeige: '#F5EDE4',
                        softBlue: '#A8C5D9',
                        deepBlue: '#5B7A8C',
                        earthBrown: '#8B7355',
                        gentleGreen: '#B5C4A8',
                        lightGray: '#E8E4DE',
                    },
                    fontFamily: {
                        serif: ['Noto Serif SC', 'Noto Serif', 'serif'],
                        sans: ['Noto Sans SC', 'Noto Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', 'Noto Sans', sans-serif;
            background-color: #FAF7F2;
        }
        .font-serif {
            font-family: 'Noto Serif SC', 'Noto Serif', serif;
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(139, 115, 85, 0.15);
        }
        .btn-gentle {
            transition: all 0.3s ease;
        }
        .btn-gentle:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 115, 85, 0.2);
        }
        .blessing-text {
            font-family: 'Noto Serif SC', serif;
            line-height: 1.8;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-cream text-gray-800">
    <nav class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-sm shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-softBlue to-deepBlue rounded-full flex items-center justify-center">
                    <span class="text-white font-serif font-bold text-lg">J</span>
                </div>
                <span class="font-serif text-xl font-semibold text-deepBlue">JesusGift</span>
            </div>
            <div class="flex items-center gap-6">
                <a href="#home" class="text-gray-600 hover:text-deepBlue transition-colors">首页</a>
                <a href="#gifts" class="text-gray-600 hover:text-deepBlue transition-colors">礼物</a>
                <a href="#blessings" class="text-gray-600 hover:text-deepBlue transition-colors">祝福语</a>
                <a href="login.html" class="px-4 py-2 bg-deepBlue text-white rounded-full text-sm font-medium hover:bg-deepBlue/90 btn-gentle">登录</a>
            </div>
        </div>
    </nav>

    <section id="home" class="pt-24 pb-16 px-4">
        <div class="max-w-6xl mx-auto text-center fade-in">
            <div class="inline-block px-4 py-1 bg-gentleGreen/20 text-earthBrown text-sm rounded-full mb-6">
                白白得来，白白舍去
            </div>
            <h1 class="font-serif text-4xl md:text-6xl font-bold text-gray-900 mb-6 leading-tight">
                送出一份<span class="text-deepBlue">祝福</span><br>
                传递一份<span class="text-earthBrown">爱</span>
            </h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto mb-10">
                在这里，每一份礼物都是一份祝福。无论是送给朋友、家人还是同事，
                让我们用真诚的心，传递温暖与希望。
            </p>
            <a href="#gifts" class="inline-block px-8 py-4 bg-gradient-to-r from-deepBlue to-softBlue text-white rounded-full font-medium btn-gentle shadow-lg">
                开始送礼物
            </a>
        </div>
    </section>

    <section id="gifts" class="py-16 px-4 bg-warmBeige">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-12 slide-up">
                <h2 class="font-serif text-3xl md:text-4xl font-bold text-gray-900 mb-4">选择一份礼物</h2>
                <p class="text-gray-600">为你关心的人挑选一份特别的祝福</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="gifts-container">
            </div>
        </div>
    </section>

    <section id="blessings" class="py-16 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-12 slide-up">
                <h2 class="font-serif text-3xl md:text-4xl font-bold text-gray-900 mb-4">精选祝福语</h2>
                <p class="text-gray-600">来自圣经的美好祝福</p>
            </div>
            <div class="space-y-6" id="blessings-container">
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-12 px-4">
        <div class="max-w-6xl mx-auto text-center">
            <div class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 bg-gradient-to-br from-softBlue to-deepBlue rounded-full flex items-center justify-center">
                    <span class="text-white font-serif font-bold text-sm">J</span>
                </div>
                <span class="font-serif text-lg font-semibold">JesusGift</span>
            </div>
            <p class="text-gray-400 text-sm mb-6">
                "你们白白地得来，也要白白地舍去。" - 马太福音 10:8
            </p>
            <div class="flex items-center justify-center gap-4 text-gray-400 text-sm">
                <a href="#" class="hover:text-white transition-colors">关于我们</a>
                <span>|</span>
                <a href="#" class="hover:text-white transition-colors">联系方式</a>
                <span>|</span>
                <a href="#" class="hover:text-white transition-colors">隐私政策</a>
            </div>
            <p class="text-gray-500 text-xs mt-6">
                © 2026 JesusGift.org. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function fetchGifts() {
            try {
                const response = await fetch(`${API_BASE}/gifts`);
                const data = await response.json();
                if (data.success && data.data) {
                    const container = document.getElementById('gifts-container');
                    container.innerHTML = data.data.map(gift => `
                        <div class="bg-white rounded-2xl p-6 card-hover cursor-pointer" onclick="shareGift('${gift.gift_key}')">
                            <div class="w-16 h-16 bg-gradient-to-br from-softBlue/20 to-gentleGreen/20 rounded-xl flex items-center justify-center mb-4">
                                <span class="text-3xl">${gift.icon === 'heart' ? '❤️' : gift.icon === 'moon' ? '🌙' : gift.icon === 'sun' ? '☀️' : gift.icon === 'badge' ? '🎖️' : gift.icon === 'cake' ? '🎂' : '💝'}</span>
                            </div>
                            <h3 class="font-serif text-xl font-semibold text-gray-900 mb-2">${gift.title_zh || gift.title}</h3>
                            <p class="text-gray-600 text-sm">${gift.description_zh || gift.description}</p>
                            <div class="mt-4 text-deepBlue text-sm font-medium flex items-center gap-1">
                                送出祝福 →
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to fetch gifts:', error);
            }
        }

        async function fetchBlessings() {
            try {
                const response = await fetch(`${API_BASE}/gifts/blessings`);
                const data = await response.json();
                if (data.success && data.data) {
                    const container = document.getElementById('blessings-container');
                    container.innerHTML = data.data.slice(0, 3).map(blessing => `
                        <div class="bg-white rounded-2xl p-6 shadow-sm">
                            <p class="blessing-text text-xl text-gray-800 mb-4 italic">${blessing.text_zh || blessing.text}</p>
                            <p class="text-earthBrown font-serif text-sm text-right">${blessing.reference_zh || blessing.reference}</p>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Failed to fetch blessings:', error);
            }
        }

        function shareGift(giftKey) {
            window.location.href = `gift-share.html?gift=${giftKey}`;
        }

        fetchGifts();
        fetchBlessings();
    </script>
</body>
</html>
