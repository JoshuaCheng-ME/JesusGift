<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定制祝福 - JesusGift.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{cream:'#FAF7F2',warmBeige:'#F5EDE4',softBlue:'#A8C5D9',deepBlue:'#5B7A8C',earthBrown:'#8B7355',gentleGreen:'#B5C4A8',lightGray:'#E8E4DE'},fontFamily:{serif:['Noto Serif SC','serif'],sans:['Noto Sans SC','sans-serif']}}}}</script>
    <style>body{font-family:'Noto Sans SC',sans-serif;background:#FAF7F2;}.font-serif{font-family:'Noto Serif SC',serif;}.input-glow:focus{box-shadow:0 0 0 3px rgba(168,197,217,0.3);}.fade-in{animation:fadeIn 0.6s ease-out;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}</style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-cream/80 backdrop-blur-sm sticky top-0 z-50 border-b border-lightGray/50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-9 h-9 rounded-full bg-softBlue/30 flex items-center justify-center">
                        <svg class="w-5 h-5 text-deepBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    </div>
                    <h1 class="text-lg font-serif font-semibold text-deepBlue">JesusGift.org</h1>
                </a>
            </div>
        </div>
    </header>
    <main class="flex-1 py-10 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="fade-in">
                    <h2 class="font-serif text-2xl font-semibold text-deepBlue mb-6">定制祝福</h2>
                    <form onsubmit="handleShare(event)">
                        <div class="space-y-6">
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">选择礼物</label><select id="giftSelect" onchange="updateGiftPreview()" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none input-glow"></select></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">收件人姓名</label><input type="text" id="toName" required placeholder="请输入收件人姓名" oninput="updateGiftPreview()" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none input-glow"></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">祝福语</label><textarea id="message" rows="4" placeholder="请输入祝福语（可选）" oninput="updateGiftPreview()" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none input-glow"></textarea></div>
                            <div><label class="block text-sm font-medium text-gray-700 mb-2">发送方式</label><div class="flex space-x-4"><label class="flex items-center space-x-2"><input type="radio" name="sendMethod" value="link" checked class="text-deepBlue"><span class="text-sm">生成分享链接</span></label><label class="flex items-center space-x-2"><input type="radio" name="sendMethod" value="email" class="text-deepBlue"><span class="text-sm">发送邮件</span></label></div></div>
                            <div id="emailField" class="hidden"><label class="block text-sm font-medium text-gray-700 mb-2">收件人邮箱</label><input type="email" id="toEmail" placeholder="请输入收件人邮箱" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue focus:ring-2 focus:ring-softBlue/20 outline-none input-glow"></div>
                            <button type="submit" class="w-full py-4 bg-deepBlue text-white rounded-xl font-medium">送出祝福</button>
                        </div>
                    </form>
                    <div id="shareMsg" class="hidden mt-4 p-4 rounded-xl text-sm"></div>
                </div>
                <div class="fade-in">
                    <h2 class="font-serif text-2xl font-semibold text-deepBlue mb-6">预览</h2>
                    <div class="bg-white rounded-2xl p-8 shadow-lg border border-lightGray/50" id="giftPreview">
                        <div class="text-center">
                            <div class="w-20 h-20 bg-gradient-to-br from-softBlue/20 to-gentleGreen/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <span class="text-4xl">🎁</span>
                            </div>
                            <h3 class="font-serif text-2xl font-bold text-gray-900 mb-2">一份特别的礼物</h3>
                            <p class="text-gray-600 mb-6">送给：<span id="previewTo">___</span></p>
                            <div class="bg-warmBeige/50 rounded-xl p-4 mb-6" id="previewMessage">
                                <p class="text-gray-700">等待输入祝福语...</p>
                            </div>
                            <p class="text-sm text-gray-400">JesusGift.org</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="py-6 text-center text-sm text-gray-400"><p>&copy; 2024 JesusGift.org</p></footer>
    <script>
        const API_BASE = window.location.origin + '/api';
        let gifts = [];
        function updateGiftPreview() {
            const giftSelect = document.getElementById('giftSelect');
            const giftKey = giftSelect.value;
            const gift = gifts.find(g => g.gift_key === giftKey);
            const iconMap = { heart: '❤️', moon: '🌙', sun: '☀️', badge: '🎖️', cake: '🎂', globe: '💝' };
            if (gift) {
                document.querySelector('#giftPreview .w-20').innerHTML = `<span class="text-4xl">${iconMap[gift.icon] || '🎁'}</span>`;
                document.querySelector('#giftPreview h3').textContent = gift.title;
            }
            document.getElementById('previewTo').textContent = document.getElementById('toName').value || '___';
            const msg = document.getElementById('message').value.trim();
            document.getElementById('previewMessage').innerHTML = msg ? `<p class="text-gray-700">${msg}</p>` : '<p class="text-gray-400">等待输入祝福语...</p>';
        }
        async function loadGifts() {
            try {
                const res = await fetch(`${API_BASE}/gifts`);
                const data = await res.json();
                if (data.success && data.data) {
                    gifts = data.data;
                    const select = document.getElementById('giftSelect');
                    select.innerHTML = gifts.map(g => `<option value="${g.gift_key}">${g.title}</option>`).join('');
                    const urlParams = new URLSearchParams(window.location.search);
                    const giftParam = urlParams.get('gift');
                    if (giftParam) select.value = giftParam;
                    updateGiftPreview();
                }
            } catch (err) { console.error(err); }
        }
        document.querySelectorAll('input[name="sendMethod"]').forEach(r => {
            r.addEventListener('change', () => {
                document.getElementById('emailField').classList.toggle('hidden', r.value !== 'email');
            });
        });
        async function handleShare(e) {
            e.preventDefault();
            const giftKey = document.getElementById('giftSelect').value;
            const toName = document.getElementById('toName').value;
            const message = document.getElementById('message').value;
            const sendMethod = document.querySelector('input[name="sendMethod"]:checked').value;
            const toEmail = sendMethod === 'email' ? document.getElementById('toEmail').value : null;
            const token = localStorage.getItem('jesusgift-token');
            try {
                const res = await fetch(`${API_BASE}/gifts/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }) },
                    body: JSON.stringify({ gift_key: giftKey, to_name: toName, message, send_method: sendMethod, to_email: toEmail })
                });
                const data = await res.json();
                const msg = document.getElementById('shareMsg');
                if (data.success) {
                    msg.className = 'mt-4 p-4 bg-green-50 border border-green-200 rounded-xl text-green-600 text-sm';
                    if (sendMethod === 'link') {
                        msg.innerHTML = `分享链接已生成：<br><input type="text" value="${data.data.url}" readonly class="w-full mt-2 px-3 py-2 bg-white border rounded text-sm">`;
                    } else {
                        msg.textContent = '祝福邮件已发送！';
                    }
                    msg.classList.remove('hidden');
                } else {
                    msg.className = 'mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm';
                    msg.textContent = data.message || '发送失败';
                    msg.classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', loadGifts);
    </script>
</body>
</html>
