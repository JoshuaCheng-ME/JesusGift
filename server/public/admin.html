<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - JesusGift.org</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{cream:'#FAF7F2',warmBeige:'#F5EDE4',softBlue:'#A8C5D9',deepBlue:'#5B7A8C',earthBrown:'#8B7355',gentleGreen:'#B5C4A8',lightGray:'#E8E4DE'},fontFamily:{serif:['Noto Serif SC','serif'],sans:['Noto Sans SC','sans-serif']}}}}</script>
    <style>body{font-family:'Noto Sans SC',sans-serif;background:#FAF7F2;}.font-serif{font-family:'Noto Serif SC',serif;}.fade-in{animation:fadeIn 0.4s ease-out;}@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}</style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-cream/80 backdrop-blur-sm sticky top-0 z-50 border-b border-lightGray/50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="flex items-center space-x-3">
                        <div class="w-9 h-9 rounded-full bg-softBlue/30 flex items-center justify-center">
                            <svg class="w-5 h-5 text-deepBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                        </div>
                        <h1 class="text-lg font-serif font-semibold text-deepBlue">JesusGift.org</h1>
                    </a>
                    <span class="px-3 py-1 bg-deepBlue/10 text-deepBlue text-sm rounded-full">管理员</span>
                </div>
                <button onclick="logout()" class="px-4 py-2 text-sm text-gray-500 hover:text-deepBlue">退出</button>
            </div>
        </div>
    </header>
    <main class="flex-1 py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 fade-in">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-lightGray/50"><div class="flex items-center justify-between"><div><p class="text-sm text-gray-400">总用户数</p><p id="statUsers" class="text-3xl font-serif text-deepBlue mt-2">0</p></div><div class="w-12 h-12 rounded-full bg-softBlue/30 flex items-center justify-center"><svg class="w-6 h-6 text-deepBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 110 5M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"/></svg></div></div></div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-lightGray/50"><div class="flex items-center justify-between"><div><p class="text-sm text-gray-400">礼物总数</p><p id="statGifts" class="text-3xl font-serif text-deepBlue mt-2">0</p></div><div class="w-12 h-12 rounded-full bg-gentleGreen/30 flex items-center justify-center"><svg class="w-6 h-6 text-earthBrown" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg></div></div></div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-lightGray/50"><div class="flex items-center justify-between"><div><p class="text-sm text-gray-400">分享总数</p><p id="statShares" class="text-3xl font-serif text-deepBlue mt-2">0</p></div><div class="w-12 h-12 rounded-full bg-earthBrown/20 flex items-center justify-center"><svg class="w-6 h-6 text-earthBrown" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg></div></div></div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg border border-lightGray/50 fade-in">
                <div class="flex border-b border-lightGray/50">
                    <button onclick="showTab('users')" class="flex-1 py-4 text-center font-medium border-b-2 border-deepBlue text-deepBlue">用户管理</button>
                    <button onclick="showTab('gifts')" class="flex-1 py-4 text-center font-medium border-b-2 border-transparent text-gray-400">礼物管理</button>
                    <button onclick="showTab('recent')" class="flex-1 py-4 text-center font-medium border-b-2 border-transparent text-gray-400">最近分享</button>
                </div>
                <div id="usersSection" class="p-6"><div class="mb-6 flex space-x-4"><input type="text" id="userSearch" placeholder="搜索邮箱或姓名..." class="flex-1 px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue outline-none" onkeyup="if(event.key==='Enter')loadUsers()"><button onclick="loadUsers()" class="px-6 py-3 bg-deepBlue text-white rounded-xl">搜索</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr class="text-left text-sm text-gray-400 border-b border-lightGray/50"><th class="pb-4">ID</th><th class="pb-4">邮箱</th><th class="pb-4">姓名</th><th class="pb-4">分享数</th><th class="pb-4">注册时间</th><th class="pb-4">操作</th></tr></thead><tbody id="usersTable"></tbody></table></div><div id="usersPagination" class="mt-6 flex justify-center space-x-2"></div></div>
                <div id="giftsSection" class="p-6 hidden"><div class="mb-6"><button onclick="showGiftModal()" class="px-6 py-3 bg-earthBrown text-white rounded-xl">添加礼物</button></div><div class="overflow-x-auto"><table class="w-full"><thead><tr class="text-left text-sm text-gray-400 border-b border-lightGray/50"><th class="pb-4">ID</th><th class="pb-4">标识</th><th class="pb-4">中文标题</th><th class="pb-4">英文标题</th><th class="pb-4">状态</th><th class="pb-4">操作</th></tr></thead><tbody id="giftsTable"></tbody></table></div></div>
                <div id="recentSection" class="p-6 hidden"><div id="recentShares" class="space-y-4"></div></div>
            </div>
        </div>
    </main>
    <div id="giftModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-lg mx-4">
            <h3 class="text-xl font-serif text-deepBlue mb-6">添加礼物</h3>
            <form onsubmit="saveGift(event)">
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">礼物标识</label><input type="text" id="giftKey" required class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">中文标题</label><input type="text" id="giftTitleZh" required class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">英文标题</label><input type="text" id="giftTitleEn" required class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-2">图标</label><select id="giftIcon" class="w-full px-4 py-3 rounded-xl border border-lightGray focus:border-softBlue outline-none"><option value="heart">heart</option><option value="moon">moon</option><option value="sun">sun</option><option value="badge">badge</option><option value="cake">cake</option><option value="globe">globe</option></select></div>
                    <input type="hidden" id="giftId">
                </div>
                <div class="mt-6 flex space-x-4"><button type="submit" class="flex-1 py-4 bg-deepBlue text-white rounded-xl font-medium">保存</button><button type="button" onclick="closeGiftModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-xl font-medium">取消</button></div>
            </form>
        </div>
    </div>
    <script>
        const API_BASE = window.location.origin + '/api';
        let token = localStorage.getItem('jesusgift-token');
        let currentPage = 1;
        function showTab(tab) {
            ['users','gifts','recent'].forEach(t=>{document.getElementById(t+'Section').classList.add('hidden');});
            document.getElementById(tab+'Section').classList.remove('hidden');
            if(tab==='users')loadUsers();if(tab==='gifts')loadGifts();if(tab==='recent')loadRecentShares();
        }
        async function loadStats() {
            try{
                const res=await fetch(`${API_BASE}/admin/stats`,{headers:{'Authorization':`Bearer ${token}`}});
                const data=await res.json();
                if(data.success){document.getElementById('statUsers').textContent=data.data.totalUsers;document.getElementById('statGifts').textContent=data.data.totalGifts;document.getElementById('statShares').textContent=data.data.totalShares;}
            }catch(err){console.error(err);}
        }
        async function loadUsers(page=1) {
            currentPage=page;
            const search=document.getElementById('userSearch').value;
            try{
                const res=await fetch(`${API_BASE}/admin/users?page=${page}&limit=10&search=${encodeURIComponent(search)}`,{headers:{'Authorization':`Bearer ${token}`}});
                const data=await res.json();
                if(data.success){
                    const tbody=document.getElementById('usersTable');
                    tbody.innerHTML=data.data.users.map(u=>`<tr class="border-b border-lightGray/30"><td class="py-4">${u.id}</td><td class="py-4">${u.email}</td><td class="py-4">${u.name||'-'}</td><td class="py-4">${u.share_count}</td><td class="py-4">${new Date(u.created_at).toLocaleDateString()}</td><td class="py-4"><button onclick="deleteUser(${u.id})" class="px-3 py-1 text-sm text-red-500 hover:bg-red-50 rounded">删除</button></td></tr>`).join('');
                    const pag=document.getElementById('usersPagination');
                    const total=data.data.pagination.totalPages;
                    pag.innerHTML=total>1?Array.from({length:total},(_,i)=>`<button onclick="loadUsers(${i+1})" class="px-3 py-1 rounded ${i+1===page?'bg-deepBlue text-white':'bg-gray-100 text-gray-600'}">${i+1}</button>`).join(''):'';
                }
            }catch(err){console.error(err);}
        }
        async function loadGifts() {
            try{
                const res=await fetch(`${API_BASE}/admin/gifts`,{headers:{'Authorization':`Bearer ${token}`}});
                const data=await res.json();
                if(data.success){
                    const tbody=document.getElementById('giftsTable');
                    tbody.innerHTML=data.data.map(g=>`<tr class="border-b border-lightGray/30"><td class="py-4">${g.id}</td><td class="py-4">${g.gift_key}</td><td class="py-4">${g.title_zh}</td><td class="py-4">${g.title_en}</td><td class="py-4"><span class="px-2 py-1 rounded text-xs ${g.is_active?'bg-green-100 text-green-600':'bg-gray-100 text-gray-400'}">${g.is_active?'启用':'禁用'}</span></td><td class="py-4"><button onclick="editGift(${g.id})" class="px-3 py-1 text-sm text-deepBlue hover:bg-softBlue/20 rounded">编辑</button><button onclick="deleteGift(${g.id})" class="px-3 py-1 text-sm text-red-500 hover:bg-red-50 rounded">删除</button></td></tr>`).join('');
                }
            }catch(err){console.error(err);}
        }
        async function loadRecentShares() {
            try{
                const res=await fetch(`${API_BASE}/admin/stats`,{headers:{'Authorization':`Bearer ${token}`}});
                const data=await res.json();
                const container=document.getElementById('recentShares');
                if(data.success&&data.data.recentShares.length>0)container.innerHTML=data.data.recentShares.map(s=>`<div class="bg-warmBeige/30 rounded-xl p-4"><p class="font-medium text-deepBlue">${s.title_zh}</p><p class="text-sm text-gray-500">${s.email} → ${s.to_name||'-'}</p></div>`).join('');
                else container.innerHTML='<p class="text-center py-12 text-gray-400">暂无数据</p>';
            }catch(err){console.error(err);}
        }
        function showGiftModal(id=null) {
            document.getElementById('giftModal').classList.remove('hidden');
            document.getElementById('giftId').value=id||'';
            if(!id){document.getElementById('giftKey').value='';document.getElementById('giftTitleZh').value='';document.getElementById('giftTitleEn').value='';}
        }
        async function editGift(id) {
            try{
                const res=await fetch(`${API_BASE}/admin/gifts`,{headers:{'Authorization':`Bearer ${token}`}});
                const data=await res.json();
                if(data.success){
                    const gift=data.data.find(g=>g.id===id);
                    if(gift){showGiftModal(id);document.getElementById('giftKey').value=gift.gift_key;document.getElementById('giftTitleZh').value=gift.title_zh;document.getElementById('giftTitleEn').value=gift.title_en;document.getElementById('giftIcon').value=gift.icon;}
                }
            }catch(err){console.error(err);}
        }
        function closeGiftModal(){document.getElementById('giftModal').classList.add('hidden');}
        async function saveGift(e) {
            e.preventDefault();
            const id=document.getElementById('giftId').value;
            const body={gift_key:document.getElementById('giftKey').value,title_zh:document.getElementById('giftTitleZh').value,title_en:document.getElementById('giftTitleEn').value,icon:document.getElementById('giftIcon').value};
            try{
                const url=id?`${API_BASE}/admin/gifts/${id}`:`${API_BASE}/admin/gifts`;
                const method=id?'PUT':'POST';
                const res=await fetch(url,{method,headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(body)});
                const data=await res.json();
                if(data.success){closeGiftModal();loadGifts();}
            }catch(err){console.error(err);}
        }
        async function deleteUser(id) {
            if(!confirm('确定要删除吗？'))return;
            try{
                await fetch(`${API_BASE}/admin/users/${id}`,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
                loadUsers();
            }catch(err){console.error(err);}
        }
        async function deleteGift(id) {
            if(!confirm('确定要删除吗？'))return;
            try{
                await fetch(`${API_BASE}/admin/gifts/${id}`,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
                loadGifts();
            }catch(err){console.error(err);}
        }
        function logout(){localStorage.removeItem('jesusgift-token');localStorage.removeItem('jesusgift-user');window.location.href='index.html';}
        document.addEventListener('DOMContentLoaded',()=>{if(!token)window.location.href='login.html';else{loadStats();loadUsers();}});
    </script>
</body>
</html>
